<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="HolГӯstic">
<meta name="theme-color" content="#120700">
<title>Jordi Torres В· DiagnГІstic HolГӯstic</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --or:#E1AF00;--or2:#F5C842;--or3:#FFF8DC;
  --red:#960000;--red2:#C41200;
  --dark:#120700;--dark2:#1E0E02;--dark3:#2A1608;--dark4:#3A2010;
  --t1:#FFF5DC;--t2:#D4A86A;--t3:#8A6540;
  --safe:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;background:var(--dark);color:var(--t1);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;overflow:hidden}
.app{display:flex;flex-direction:column;height:100vh;height:100dvh}

/* TOPBAR */
.topbar{
  background:var(--dark2);
  border-bottom:2px solid var(--or);
  padding:10px 16px;
  padding-top:max(12px,env(safe-area-inset-top));
  display:flex;align-items:center;gap:10px;
  flex-shrink:0;
}
.tb-logo{font-size:1.6rem}
.tb-name{font-size:1rem;font-weight:700;color:var(--or)}
.tb-sub{font-size:10px;color:var(--t3);letter-spacing:.1em}

/* SCREENS */
.screen{display:none;flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.screen.on{display:flex;flex-direction:column}

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ SCREEN 1: PACIENT в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
.s1{padding:20px 16px;gap:14px}
.s1-title{font-size:1.3rem;font-weight:700;color:var(--or);margin-bottom:4px}
.s1-sub{font-size:13px;color:var(--t3);margin-bottom:8px}
.inp-group{display:flex;flex-direction:column;gap:6px}
.inp-label{font-size:12px;color:var(--t2);font-weight:600;letter-spacing:.08em;text-transform:uppercase}
.inp{
  background:var(--dark3);border:2px solid rgba(225,175,0,.25);
  border-radius:14px;padding:14px 16px;color:var(--t1);
  font-size:16px;font-family:inherit;width:100%;
  -webkit-appearance:none;transition:border .2s;
}
.inp:focus{outline:none;border-color:var(--or)}
.inp-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn-start{
  margin-top:8px;padding:18px;border:none;border-radius:16px;
  background:linear-gradient(135deg,var(--or),var(--red));
  color:var(--dark);font-size:17px;font-weight:800;
  letter-spacing:.05em;cursor:pointer;width:100%;
  box-shadow:0 6px 24px rgba(225,175,0,.3);
}
.btn-start:active{transform:scale(.98)}
.pts-list{display:flex;flex-direction:column;gap:8px}
.pt-item{
  background:var(--dark3);border:1.5px solid rgba(225,175,0,.2);
  border-radius:14px;padding:14px 16px;
  display:flex;align-items:center;gap:12px;cursor:pointer;
}
.pt-item:active{border-color:var(--or);background:var(--dark4)}
.pt-av{width:42px;height:42px;border-radius:50%;
  background:linear-gradient(135deg,var(--or),var(--red));
  display:flex;align-items:center;justify-content:center;
  font-size:1.1rem;flex-shrink:0}
.pt-nom{font-size:15px;font-weight:700;color:var(--t1)}
.pt-meta{font-size:12px;color:var(--t3);margin-top:2px}
.pt-n-sess{font-size:11px;background:rgba(225,175,0,.15);
  border:1px solid rgba(225,175,0,.3);color:var(--or);
  padding:3px 8px;border-radius:999px;margin-left:auto;white-space:nowrap}

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ SCREEN 2: SESSIГ“ в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
.s2{padding:0}
.s2-header{
  background:var(--dark2);padding:14px 16px 12px;
  border-bottom:1px solid rgba(225,175,0,.2);
  display:flex;align-items:center;gap:10px;
}
.s2-back{font-size:1.2rem;cursor:pointer;color:var(--or);padding:4px 8px 4px 0}
.s2-pt{flex:1}
.s2-pt-nom{font-size:15px;font-weight:700;color:var(--t1)}
.s2-pt-info{font-size:11px;color:var(--t3);margin-top:2px}
.s2-body{padding:14px 16px;display:flex;flex-direction:column;gap:12px;
  padding-bottom:calc(100px + var(--safe))}

/* MГҲTODE CARD вҖ” EL COR DE L'APP */
.met-card{
  background:var(--dark2);
  border:2px solid rgba(225,175,0,.2);
  border-radius:20px;overflow:hidden;
  transition:border .2s;
}
.met-card.done{border-color:var(--or)}
.met-card.active{border-color:var(--or2);box-shadow:0 0 20px rgba(225,175,0,.2)}

.met-header{
  display:flex;align-items:center;gap:12px;
  padding:16px;cursor:pointer;
}
.met-icon{font-size:2rem;width:52px;height:52px;
  background:var(--dark3);border-radius:14px;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:background .2s}
.met-card.done .met-icon{background:rgba(225,175,0,.15)}
.met-card.active .met-icon{background:rgba(225,175,0,.2)}
.met-info{flex:1}
.met-nom{font-size:16px;font-weight:700;color:var(--t1)}
.met-guia{font-size:12px;color:var(--t3);margin-top:3px;line-height:1.5}
.met-status{flex-shrink:0}
.met-check{width:30px;height:30px;border-radius:50%;
  background:var(--or);display:flex;align-items:center;
  justify-content:center;font-size:14px;display:none}
.met-card.done .met-check{display:flex}
.met-num{width:30px;height:30px;border-radius:50%;
  border:2px solid rgba(225,175,0,.3);
  display:flex;align-items:center;justify-content:center;
  font-size:13px;color:var(--t3);font-weight:700}
.met-card.done .met-num,.met-card.active .met-num{display:none}

.met-body{display:none;padding:0 16px 16px}
.met-card.active .met-body{display:block}

/* ZONA CГҖMERA */
.cam-zona{
  border:2px dashed rgba(225,175,0,.35);
  border-radius:14px;background:var(--dark3);
  min-height:160px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:8px;
  cursor:pointer;margin-bottom:10px;overflow:hidden;
  position:relative;transition:border .2s;
}
.cam-zona.has-img{border-style:solid;border-color:var(--or);min-height:0}
.cam-zona:active{border-color:var(--or)}
.cam-emoji{font-size:2.2rem;opacity:.4}
.cam-txt{font-size:13px;color:var(--t3);text-align:center;line-height:1.6}
.cam-txt span{color:var(--or);font-size:11px}
.cam-prev{width:100%;max-height:220px;object-fit:cover;display:block;border-radius:12px}
.cam-del{position:absolute;top:8px;right:8px;
  background:rgba(18,7,0,.9);border:1px solid rgba(225,175,0,.4);
  color:var(--t2);border-radius:8px;padding:5px 10px;
  font-size:12px;cursor:pointer;z-index:2}

.cam-btns{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px}
.cam-btn{
  padding:12px 6px;border:1.5px solid rgba(225,175,0,.25);
  border-radius:12px;background:var(--dark3);color:var(--t2);
  font-size:12px;font-weight:600;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:4px;
  font-family:inherit;
}
.cam-btn:active{border-color:var(--or);color:var(--or2);background:var(--dark4)}
.cam-btn-icon{font-size:1.4rem}

.btn-analitza{
  width:100%;padding:15px;border:none;border-radius:14px;
  background:linear-gradient(135deg,var(--or),var(--red));
  color:var(--dark);font-size:15px;font-weight:800;
  cursor:pointer;display:flex;align-items:center;
  justify-content:center;gap:8px;font-family:inherit;
  box-shadow:0 4px 18px rgba(225,175,0,.25);
}
.btn-analitza:disabled{opacity:.35;cursor:not-allowed;box-shadow:none}
.btn-analitza:active:not(:disabled){transform:scale(.99)}

/* RESULTAT */
.resultat{
  background:var(--dark3);border:1.5px solid rgba(225,175,0,.3);
  border-radius:14px;padding:14px;margin-top:10px;
  font-size:13px;color:var(--t2);line-height:1.8;white-space:pre-wrap;
}
.resultat strong{color:var(--or);font-size:11px;letter-spacing:.12em;
  text-transform:uppercase;display:block;margin-top:.8rem;margin-bottom:.1rem}
.urg-badge{display:inline-flex;align-items:center;gap:5px;
  padding:4px 10px;border-radius:999px;font-size:11px;font-weight:700;margin-bottom:8px}
.urg-g{background:rgba(76,175,80,.15);border:1px solid rgba(76,175,80,.4);color:#81C784}
.urg-y{background:rgba(255,193,7,.15);border:1px solid rgba(255,193,7,.4);color:#FFD54F}
.urg-r{background:rgba(244,67,54,.15);border:1px solid rgba(244,67,54,.4);color:#EF9A9A}

/* SPINNER */
.spin{width:18px;height:18px;border:2.5px solid rgba(18,7,0,.3);
  border-top-color:var(--dark);border-radius:50%;
  animation:spin .7s linear infinite;display:none;flex-shrink:0}
.spin.on{display:block}
@keyframes spin{to{transform:rotate(360deg)}}

/* BOTTOM BAR */
.bottom-bar{
  position:fixed;bottom:0;left:0;right:0;
  background:var(--dark2);
  border-top:2px solid var(--or);
  padding:12px 16px;
  padding-bottom:max(14px,var(--safe));
  z-index:100;
}
.btn-word{
  width:100%;padding:16px;border:none;border-radius:16px;
  background:linear-gradient(135deg,var(--or),var(--red));
  color:var(--dark);font-size:16px;font-weight:800;
  cursor:pointer;display:flex;align-items:center;
  justify-content:center;gap:10px;font-family:inherit;
  box-shadow:0 6px 22px rgba(225,175,0,.3);letter-spacing:.05em;
}
.btn-word:disabled{opacity:.3;cursor:not-allowed;box-shadow:none}
.btn-word:active:not(:disabled){transform:scale(.99)}
.word-count{
  font-size:12px;color:var(--t3);text-align:center;
  margin-top:7px;letter-spacing:.05em;
}
.word-count span{color:var(--or);font-weight:700}

/* SESSIГ“ HISTORIAL */
.hist-card{
  background:var(--dark3);border:1.5px solid rgba(225,175,0,.2);
  border-radius:16px;overflow:hidden;margin-bottom:8px;
}
.hist-hdr{display:flex;align-items:center;gap:10px;padding:13px 14px;cursor:pointer}
.hist-date{font-size:12px;color:var(--t2);flex:1}
.hist-mets{font-size:1rem;display:flex;gap:3px}
.hist-body{padding:0 14px 14px;border-top:1px solid rgba(225,175,0,.12);display:none}
.hist-body.open{display:block}
.hist-res{font-size:12px;color:var(--t2);line-height:1.7;margin-top:10px;white-space:pre-wrap}

/* MODAL WORD */
.modal-ov{
  position:fixed;inset:0;background:rgba(10,4,0,.92);
  backdrop-filter:blur(12px);z-index:300;
  display:none;align-items:flex-end;justify-content:center
}
.modal-ov.open{display:flex}
.modal{
  background:var(--dark2);border:1.5px solid rgba(225,175,0,.3);
  border-radius:22px 22px 0 0;padding:22px 18px;
  padding-bottom:calc(22px + var(--safe));
  width:100%;max-height:80vh;overflow-y:auto;
  animation:slideUp .3s cubic-bezier(.34,1.56,.64,1);
}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-hdl{width:38px;height:4px;background:rgba(225,175,0,.3);
  border-radius:2px;margin:0 auto 18px}
.modal-ttl{font-size:1.1rem;font-weight:700;color:var(--or);margin-bottom:6px}
.modal-sub{font-size:13px;color:var(--t3);margin-bottom:18px;line-height:1.6}
.modal-prog{margin-bottom:16px}
.prog-item{display:flex;align-items:center;gap:8px;padding:8px 0;
  border-bottom:1px solid rgba(225,175,0,.1);font-size:13px;color:var(--t2)}
.prog-icon{font-size:1.1rem;width:28px;text-align:center}
.prog-spin{width:16px;height:16px;border:2px solid rgba(225,175,0,.2);
  border-top-color:var(--or);border-radius:50%;
  animation:spin .7s linear infinite;flex-shrink:0;display:none}
.prog-ok{color:#81C784;font-size:1rem;display:none}
.prog-item.loading .prog-spin{display:block}
.prog-item.done .prog-ok{display:block}
.prog-item.done .prog-spin{display:none}
.word-result{display:none;text-align:center;padding:10px 0}
.word-result.show{display:block}
.word-blob{display:block;padding:16px;border-radius:14px;
  background:linear-gradient(135deg,var(--or),var(--red));
  color:var(--dark);font-size:15px;font-weight:800;
  text-decoration:none;text-align:center;margin-bottom:10px;
  cursor:pointer;border:none;width:100%;font-family:inherit}
.word-note{font-size:12px;color:var(--t3);line-height:1.7}

/* TOAST */
.toast{position:fixed;bottom:calc(90px + var(--safe));left:50%;
  transform:translateX(-50%) translateY(20px);
  background:linear-gradient(135deg,var(--or),var(--red));
  color:var(--dark);padding:10px 20px;border-radius:999px;
  font-size:13px;font-weight:700;z-index:500;
  white-space:nowrap;opacity:0;transition:all .3s;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* SCROLLBAR */
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:rgba(225,175,0,.3);border-radius:2px}
</style>
</head>
<body>
<div class="app">

  <!-- TOPBAR -->
  <div class="topbar">
    <div class="tb-logo">рҹҢҝ</div>
    <div>
      <div class="tb-name">Jordi Torres Isach</div>
      <div class="tb-sub">DiagnГІstic HolГӯstic</div>
    </div>
  </div>

  <!-- SCREEN 1: LLISTA PACIENTS + NOU -->
  <div class="screen on s1" id="s-pacients">
    <div class="s1-title">Nova consulta</div>
    <div class="s1-sub">Crea un pacient o selecciona'n un d'existent</div>

    <div class="inp-group">
      <label class="inp-label">Nom complet</label>

    </div>
    <div class="inp-row">
      <div class="inp-group">
        <label class="inp-label">Edat</label>

    </div>
    <button class="btn-start" onclick="iniciarSessio()">

    <div style="height:1px;background:rgba(225,175,0,.2);margin:4px 0"></div>

    <div class="pts-list" id="ptsList"></div>
    <div style="height:20px"></div>
  </div>

  <!-- SCREEN 2: SESSIГ“ DIAGNГ’STIC -->
  <div class="screen" id="s-sessio">
    <div class="s2-header">
      <div class="s2-back" onclick="tornarPacients()">вҶҗ</div>
      <div class="s2-pt">
        <div class="s2-pt-nom" id="s2nom">вҖ”</div>
        <div class="s2-pt-info" id="s2info">вҖ”</div>
      </div>
    </div>

    <div class="s2-body" id="s2body">
      <!-- Cards dels mГЁtodes es creen dinГ micament -->
    </div>

    <!-- BOTTOM BAR amb botГі Word -->
    <div class="bottom-bar">
      <button class="btn-word" id="btnWord" disabled onclick="generaWord()">
        <div class="spin" id="wordSpin"></div>
        <span id="btnWordTxt">рҹ“„ Genera Informe Word</span>
      </button>
      <div class="word-count" id="wordCount">0 de 4 mГЁtodes completats</div>
    </div>
  </div>

</div>

<!-- MODAL WORD -->
<div class="modal-ov" id="modalWord">
  <div class="modal">
    <div class="modal-hdl"></div>
    <div class="modal-ttl">рҹ“„ Generant l'Informe Word</div>
    <div class="modal-sub" id="modalSub">Analitzant tots els mГЁtodes i generant el document...</div>
    <div class="modal-prog" id="modalProg"></div>
    <div class="word-result" id="wordResult">
      <div style="font-size:2.5rem;margin-bottom:12px">вң…</div>
      <div style="font-size:15px;font-weight:700;color:var(--or);margin-bottom:8px">Informe generat!</div>
      <div class="word-note" id="wordNote"></div>
      <div style="height:14px"></div>
      <button class="word-blob" onclick="copiaInforme()">рҹ“Ӣ Copiar informe complet</button>
      <button class="word-blob" style="background:var(--dark3);border:1.5px solid rgba(225,175,0,.4);color:var(--or)" onclick="comparteixWA()">рҹ“І Enviar per WhatsApp</button>
      <button class="word-blob" style="background:transparent;border:1.5px solid rgba(225,175,0,.25);color:var(--t2);margin-top:4px" onclick="tancaModal()">Tancar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- Inputs cГ mera -->
<input type="file" id="galIn" accept="image/*" onchange="handleImg(event)" style="display:none">
<input type="file" id="envIn" accept="image/*" capture="environment" onchange="handleImg(event)" style="display:none">
<input type="file" id="usrIn" accept="image/*" capture="user" onchange="handleImg(event)" style="display:none">

<script>
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
// CONFIG
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
const METODES = [
  {id:'iris',  icon:'рҹ‘Ғ',  nom:'Iris i ulls',      guia:'Foto de prop, llum natural. L\'iris ha de ser ben visible.'},
  {id:'tong',  icon:'рҹ«Ұ', nom:'Llengua',           guia:'Llengua treta completament. Llum blanca. En dejГә si Г©s possible.'},
  {id:'nail',  icon:'рҹ’…', nom:'Ungles i mans',     guia:'Les dues mans, llum natural, sense esmalt. LГәnula visible.'},
  {id:'ear',   icon:'рҹ‘Ӯ', nom:'Orella',            guia:'PavellГі auricular complet, llum natural. LГІbul visible.'},
];

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
// ESTAT
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
let patients = JSON.parse(localStorage.getItem('pts') || '[]');
let currentPt = null;
let currentImages = {}; // {iris: {b64, type, src}, ...}
let currentResults = {}; // {iris: {text, urg}, ...}
let activeMetId = null;
let currentCamMet = null;
let fullInforme = '';

// PACIENTS
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
function renderPtsList() {
  const el = document.getElementById('ptsList');
  if (!patients.length) { el.innerHTML = '<div style="font-size:13px;color:var(--t3);text-align:center;padding:12px">Cap pacient. Crea el primer!</div>'; return; }
  el.innerHTML = patients.slice(0,6).map(p => `
    <div class="pt-item" onclick="selPt('${p.id}')">
      <div class="pt-av">${p.sexe==='Dona'?'вҷҖ':p.sexe==='Home'?'вҷӮ':'в—Ҳ'}</div>
      <div style="flex:1;min-width:0">
        <div class="pt-nom">${p.nom}</div>
        <div class="pt-meta">${p.edat?p.edat+' anys В· ':''}${p.motiu||'Sense motiu'}</div>
      </div>
      <div class="pt-n-sess">${(p.sessions||[]).length} sess.</div>
    </div>`).join('');
}

function iniciarSessio() {
  const nom = document.getElementById('ptNom').value.trim();
  if (!nom) { showToast('Escriu el nom del pacient'); return; }
  const edat = document.getElementById('ptEdat').value;
  const sexe = document.getElementById('ptSexe').value;
  const motiu = document.getElementById('ptMotiu').value.trim();

  // Cercar si ja existeix
  let pt = patients.find(p => p.nom.toLowerCase() === nom.toLowerCase());
  if (!pt) {
    pt = { id: 'P'+Date.now(), nom, edat, sexe, motiu, sessions: [] };
    patients.unshift(pt);
    savePts();
  }
  obrirSessio(pt);
}

function selPt(id) {
  const pt = patients.find(p => p.id === id);
  if (pt) obrirSessio(pt);
}

function obrirSessio(pt) {
  currentPt = pt;
  currentImages = {};
  currentResults = {};
  activeMetId = null;
  fullInforme = '';

  document.getElementById('s2nom').textContent = pt.nom;
  document.getElementById('s2info').textContent = [pt.edat ? pt.edat+' anys' : '', pt.sexe, pt.motiu].filter(Boolean).join(' В· ') || 'Sense dades';

  buildMetCards();
  updateWordBtn();

  // Netejar inputs
  document.getElementById('ptNom').value = '';
  document.getElementById('ptEdat').value = '';
  document.getElementById('ptSexe').value = '';
  document.getElementById('ptMotiu').value = '';

  goScreen('s-sessio');
  // Obrir primer mГЁtode automГ ticament
  setTimeout(() => toggleMet('iris'), 200);
}

function tornarPacients() {
  goScreen('s-pacients');
  renderPtsList();
}

function savePts() {
  localStorage.setItem('pts', JSON.stringify(patients));
}

function renderHistorial() {

  return `<div style="margin-top:8px">
    <div style="font-size:11px;color:var(--t3);letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px">Sessions anteriors</div>

      <div class="hist-card">
        <div class="hist-hdr" onclick="togHist('hs${i}')">
          <div class="hist-mets">${(s.mets||[]).map(m=>METODES.find(x=>x.id===m)?.icon||'').join('')}</div>
          <div class="hist-date">${new Date(s.date).toLocaleDateString('ca-ES')}</div>
          <div style="color:var(--t3);font-size:12px">в–ҫ</div>
        </div>
        <div class="hist-body" id="hs${i}">
          ${Object.entries(s.results||{}).map(([mid,r]) => {
            const m = METODES.find(x=>x.id===mid);
            return `<div style="margin-top:10px;font-size:12px;color:var(--or);font-weight:700">${m?.icon||''} ${m?.nom||mid}</div>

function togHist(id) {
  document.getElementById(id)?.classList.toggle('open');
}

function toggleMet(id) {
  // Tancar l'anterior
  if (activeMetId && activeMetId !== id) {
    document.getElementById('mc-'+activeMetId)?.classList.remove('active');
  }
  const card = document.getElementById('mc-'+id);
  if (!card) return;
  const isOpen = card.classList.contains('active');
  card.classList.toggle('active', !isOpen);
  activeMetId = isOpen ? null : id;
  if (!isOpen) {
    // Scroll suau fins a la card
    setTimeout(() => card.scrollIntoView({behavior:'smooth', block:'start'}), 100);
  }
}

function camZonaTap(id) {
  openCam('env', id);
}

function openCam(tipus, metId) {
  currentCamMet = metId;
  const inp = document.getElementById(tipus+'In');
  inp.value = '';
  inp.click();
}

function handleImg(e) {
  const f = e.target.files[0];
  if (!f || !currentCamMet) return;
  e.target.value = '';
  const r = new FileReader();
  r.onload = ev => {
    const src = ev.target.result;
    const b64 = src.split(',')[1];
    currentImages[currentCamMet] = { b64, type: f.type, src };
    renderCamZona(currentCamMet);
    // Habilitar botГі analitzar
    const ba = document.getElementById('ba-'+currentCamMet);
    if (ba) { ba.disabled = false; document.getElementById('bat-'+currentCamMet).textContent = 'в—ү Analitzar '+METODES.find(m=>m.id===currentCamMet)?.nom; }
  };
  r.readAsDataURL(f);
}

function renderCamZona(id) {
  const img = currentImages[id];
  const zona = document.getElementById('cz-'+id);
  if (!zona) return;
  if (img) {
    zona.classList.add('has-img');
    zona.innerHTML = `<button class="cam-del" onclick="clearImg('${id}');event.stopPropagation()">вң• Treure</button><img class="cam-prev" src="${img.src}">`;
    zona.onclick = null;
  } else {
    zona.classList.remove('has-img');
    zona.innerHTML = `<div class="cam-emoji">рҹ“·</div><div class="cam-txt">Toca per obrir la cГ mera<br><span>o usa els botons de sota</span></div>`;
    zona.onclick = () => camZonaTap(id);
  }
}

function clearImg(id) {
  delete currentImages[id];
  delete currentResults[id];
  renderCamZona(id);
  const ba = document.getElementById('ba-'+id);
  if (ba) { ba.disabled = true; document.getElementById('bat-'+id).textContent = 'Fes la foto primer'; }
  document.getElementById('res-'+id).innerHTML = '';
  document.getElementById('mc-'+id)?.classList.remove('done');
  updateWordBtn();
}

async function analitza(id) {
  const img = currentImages[id];
  if (!img) return;

  const btn = document.getElementById('ba-'+id);
  const sp = document.getElementById('sp-'+id);
  const btxt = document.getElementById('bat-'+id);
  const resEl = document.getElementById('res-'+id);

  btn.disabled = true;
  sp.classList.add('on');
  btxt.textContent = 'AnalitzantвҖҰ';
  resEl.innerHTML = '';

  const age = currentPt?.edat ? `El pacient tГ© ${currentPt.edat} anys.` : '';
  const prompt = (PROMPTS[id]||PROMPTS.iris) + (age ? '\n\n'+age : '');

  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 1000,
        messages: [{role:'user', content:[
          {type:'image', source:{type:'base64', media_type:img.type, data:img.b64}},
          {type:'text', text:prompt}
        ]}]
      })
    });
    const data = await resp.json();
    if (data.error) throw new Error(data.error.message);
    const text = data.content.map(b=>b.text||'').join('');

    // Detectar urgГЁncia
    const tu = text.toUpperCase();
    let urg = 'g';
    if (tu.includes('VERMELLA') || tu.includes('CRГҚTIC')) urg = 'r';
    else if (tu.includes('GROGA') || tu.includes('MODERAD')) urg = 'y';
    const urgLabels = {g:'рҹҹў Preventiu', y:'рҹҹЎ AtenciГі moderada', r:'рҹ”ҙ Prioritat alta'};

    currentResults[id] = { text, urg };

    // Format del text
    const fmt = text.replace(/(\d+\.\s+[A-ZГҒГҲГүГҚГ“ГҡГңГҖГҲГҢГ’ГҷГҮ\s\/В·'']+:)/g, '<strong>$1</strong>');
    resEl.innerHTML = `<div class="resultat"><span class="urg-badge urg-${urg}">${urgLabels[urg]}</span>\n${fmt}</div>`;

    // Marcar com a done
    document.getElementById('mc-'+id)?.classList.add('done');

    // Auto-obrir el segГјent
    const idx = METODES.findIndex(m=>m.id===id);
    if (idx < METODES.length-1) {
      const nextId = METODES[idx+1].id;
      setTimeout(() => {
        toggleMet(id); // tancar actual
        setTimeout(() => toggleMet(nextId), 200); // obrir segГјent
      }, 1200);
    }

    updateWordBtn();
    showToast(METODES.find(m=>m.id===id)?.icon + ' AnГ lisi completada вң“');

  } catch(err) {
    resEl.innerHTML = `<div class="resultat" style="color:#EF9A9A">Error: ${err.message}</div>`;
  }

  btn.disabled = false;
  sp.classList.remove('on');
  btxt.textContent = 'в—ү Tornar a analitzar';
}

  const done = Object.keys(currentResults).length;
  const btn = document.getElementById('btnWord');
  const count = document.getElementById('wordCount');
  btn.disabled = done === 0;
  const total = METODES.length;
  count.innerHTML = `<span>${done}</span> de ${total} mГЁtodes completats${done>0?' В· Ja pots generar!':''}`;
}

    // Guardar a la sessiГі
    const sessio = {
      date: new Date().toISOString(),
      mets: metsCompletats.map(m=>m.id),
      results: currentResults,
      informe: fullInforme,
    };
    if (!currentPt.sessions) currentPt.sessions = [];
    currentPt.sessions.unshift(sessio);
    savePts();

    // Mostrar resultat
    document.getElementById('wordNote').innerHTML = `Informe generat per a <strong>${pt.nom}</strong>.<br>Copia'l o envia'l directament per WhatsApp.`;
    document.getElementById('wordResult').classList.add('show');
    document.getElementById('modalSub').textContent = 'Informe llest! вң“';

  } catch(err) {
    document.getElementById('modalSub').textContent = 'Error: ' + err.message;
  }
}

function copiaInforme() {
  navigator.clipboard?.writeText(fullInforme)
    .then(() => showToast('Informe copiat! вң“'))
    .catch(() => {
      // Fallback
      const ta = document.createElement('textarea');
      ta.value = fullInforme;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      ta.remove();
      showToast('Informe copiat! вң“');
    });
}

function comparteixWA() {
  const text = `рҹҢҝ *Informe de Salut HolГӯstic*\n*${currentPt?.nom}*\n\n${fullInforme}\n\n_Jordi Torres Isach В· 677 010 458 В· jtorres.cat_`;
  window.open('https://wa.me/?text=' + encodeURIComponent(text));
}

function tancaModal() {
  document.getElementById('modalWord').classList.remove('open');
}

function goScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('on'));
  document.getElementById(id)?.classList.add('on');
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
